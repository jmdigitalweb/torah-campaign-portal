<script>
(function(){
  const B = JSON.parse(document.getElementById('blob').textContent);
  const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
  const f = document.getElementById('f'), pw = document.getElementById('pw'),
        err = document.getElementById('err'), go = document.getElementById('go');
  f.addEventListener('submit', async (e) => {
    e.preventDefault(); err.textContent=''; go.disabled=true; go.textContent='Unlocking…';
    try {
      const enc = new TextEncoder();
      const km = await crypto.subtle.importKey('raw', enc.encode(pw.value), 'PBKDF2', false, ['deriveKey']);
      const key = await crypto.subtle.deriveKey(
        { name:'PBKDF2', salt:b64(B.salt), iterations:B.iter, hash:'SHA-256' },
        km, { name:'AES-GCM', length:256 }, false, ['decrypt']);
      const ptBuf = await crypto.subtle.decrypt({ name:'AES-GCM', iv:b64(B.iv) }, key, b64(B.ct));
      const html = new TextDecoder().decode(ptBuf);
      try { sessionStorage.setItem('sow_ok','1'); } catch(_){}
      document.open(); document.write(html); document.close();
    } catch (_) {
      err.textContent = 'Incorrect password. Please try again.';
      go.disabled=false; go.textContent='Unlock'; pw.select();
    }
  });
})();
</script>
