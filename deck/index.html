<script>
(function(){
  const B = JSON.parse(document.getElementById('blob').textContent);
  const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
  const f = document.getElementById('f'), pw = document.getElementById('pw'),
        err = document.getElementById('err'), go = document.getElementById('go');
  const txt = (en,he) => document.documentElement.lang==='he' ? he : en;
  function setG(l){
    document.documentElement.lang=l;
    document.documentElement.dir = l==='he' ? 'rtl' : 'ltr';
    document.getElementById('g-en').classList.toggle('active', l==='en');
    document.getElementById('g-he').classList.toggle('active', l==='he');
    pw.placeholder = l==='he' ? 'סיסמה' : 'Password';
    try { localStorage.setItem('lang', l); } catch(_){}
  }
  window.setG = setG;
  (function(){
    var p, s;
    try { p = new URLSearchParams(location.search).get('lang'); } catch(_){}
    try { s = localStorage.getItem('lang'); } catch(_){}
    setG((p==='he'||p==='en') ? p : ((s==='he'||s==='en') ? s : 'en'));
  })();
  async function unlock(pwv){
    const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(pwv), 'PBKDF2', false, ['deriveKey']);
    for (const k of B.keys){
      try {
        const kek = await crypto.subtle.deriveKey(
          { name:'PBKDF2', salt:b64(k.salt), iterations:B.iter, hash:'SHA-256' },
          km, { name:'AES-GCM', length:256 }, false, ['decrypt']);
        const cekBuf = await crypto.subtle.decrypt({ name:'AES-GCM', iv:b64(k.iv) }, kek, b64(k.ct));
        const cek = await crypto.subtle.importKey('raw', cekBuf, { name:'AES-GCM' }, false, ['decrypt']);
        const ptBuf = await crypto.subtle.decrypt({ name:'AES-GCM', iv:b64(B.iv) }, cek, b64(B.ct));
        return new TextDecoder().decode(ptBuf);
      } catch(_){ /* try next accepted password */ }
    }
    return null;
  }
  f.addEventListener('submit', async (e) => {
    e.preventDefault(); err.textContent=''; go.disabled=true; go.innerHTML = txt('Unlocking…','פותח…');
    const html = await unlock(pw.value);
    if (html){
      try { sessionStorage.setItem('sow_ok','1'); } catch(_){}
      document.open(); document.write(html); document.close();
    } else {
      err.textContent = txt('Incorrect password. Please try again.','סיסמה שגויה. נסו שוב.');
      go.disabled=false; go.innerHTML='<span class="en">Unlock</span><span class="he">כניסה</span>'; pw.select();
    }
  });
})();
</script>
<script>
(function(){var a=document.getElementById('bgm'),b=document.getElementById('bgmBtn');if(!a||!b)return;a.volume=0.45;
function paint(){b.textContent=a.paused?'🔇':'🔊';b.classList.toggle('muted',a.paused);}
function start(){var p=a.play();if(p&&p.catch)p.catch(function(){});}
start();['pointerdown','touchstart','keydown'].forEach(function(ev){window.addEventListener(ev,function(){if(a.paused)start();},{once:true,passive:true});});
b.addEventListener('click',function(e){e.stopPropagation();if(a.paused)a.play();else a.pause();paint();});
a.addEventListener('play',paint);a.addEventListener('pause',paint);paint();})();
</script>
